<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support | Lumi Stays</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-badge">L</span><span>Lumi Stays</span></a>
      <a href="user_dashboard.html">Dashboard</a>
      <a href="reservation.html">Reserve</a>
      <a href="bookings.html">Bookings</a>
      <a href="history.html">History</a>
      <a href="billing.html">Billing</a>
      <a class="active" href="support.html">Support</a>
      <a href="services.html">Services</a>
      <a href="#" data-logout>Logout</a>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-card">Concierge and support desk</div>
        <div class="action-row"><button class="icon-btn" data-theme-toggle onclick="toggleTheme()">☾</button></div>
      </div>
      <div class="grid-2">
        <div class="panel">
          <h3>Contact support</h3>
          <p class="muted">Ask for transfers, room service, itinerary planning, stay assistance, or billing support.</p>
          <div id="supportNotice"></div>
          <form id="supportForm" class="form-grid">
            <div class="field"><label>Name</label><input name="name" required></div>
            <div class="field"><label>Email</label><input name="email" type="email" required></div>
            <div class="field full"><label>Subject</label><input name="subject" required></div>
            <div class="field full"><label>Message</label><textarea name="message" required></textarea></div>
            <div class="field full"><button class="btn" type="submit" style="width:100%;">Send request</button></div>
          </form>
        </div>
        <div class="panel">
          <h3>Open tickets</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Name</th><th>Subject</th><th>Email</th><th>Status</th></tr></thead>
              <tbody id="ticketTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/support.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
