<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Status | Lumi Stays</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-badge">L</span><span>Lumi Admin</span></a>
      <a href="admin_dashboard.html">Dashboard</a>
      <a href="bookings.html">Reservations</a>
      <a class="active" href="roomstatus.html">Room Status</a>
      <a href="analytics.html">Analytics</a>
      <a href="branch_management.html">Branches</a>
      <a href="#" data-logout>Logout</a>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-card">Live inventory and readiness</div>
        <div class="action-row"><select class="branch-selector" data-branch-selector><option>Goa Seaside Lumi</option><option>Mumbai Grand Marina</option><option>Delhi Imperial Heights</option><option>Jaipur Heritage Royale</option><option>Kolkata Riverside Palace</option></select><button class="icon-btn" data-theme-toggle onclick="toggleTheme()">☾</button></div>
      </div>
      <div class="grid-2">
        <div class="panel">
          <h3>Operational status</h3>
          <ul class="feature-list">
            <li><span>Available rooms</span><strong id="activeRooms">0</strong></li>
            <li><span>Cleaning in progress</span><strong>1</strong></li>
            <li><span>Maintenance lockouts</span><strong>1</strong></li>
            <li><span>Occupied premium suites</span><strong>1</strong></li>
          </ul>
        </div>
        <div class="panel">
          <img class="preview-image" src="images/room2.jpg" alt="Room status visual">
        </div>
      </div>
      <div class="panel" style="margin-top:22px;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Room No</th><th>Branch</th><th>Type</th><th>Floor</th><th>Rate</th><th>Status</th></tr></thead>
            <tbody id="roomStatusTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
