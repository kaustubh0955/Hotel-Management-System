<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Lumi Stays</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-shell">
    <div class="auth-card">
      <div class="auth-visual" style="background-image:linear-gradient(rgba(8,18,30,.2), rgba(8,18,30,.35)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1400&q=80')"></div>
      <section class="auth-form">
        <div class="brand" style="margin-bottom:18px;"><span class="brand-badge">L</span><span>Lumi Stays</span></div>
        <div class="stars">★★★★★</div>
        <h1>Sign in to your Lumi account</h1>
        <p class="muted">Access reservations, loyalty perks, premium services, and admin controls from one luxury platform.</p>
        <div class="banner-note" style="margin:16px 0;">Demo login: Customer <strong>guest101 / guest123</strong> · Admin <strong>admin101 / admin123</strong></div>
        <div id="loginNotice"></div>
        <form id="loginForm" class="form-grid">
          <div class="field full"><label for="loginId">User ID</label><input type="text" id="loginId" placeholder="Enter guest101 or admin101" required></div>
          <div class="field full"><label for="loginPass">Password</label><input type="password" id="loginPass" placeholder="Enter your password" required></div>
          <div class="field full"><label for="role">Role</label><select id="role"><option value="user">Customer</option><option value="admin">Admin / Staff</option></select></div>
          <div class="field full"><button class="btn" type="submit" style="width:100%;">Sign In</button></div>
        </form>
        <p class="muted" style="margin-top:20px;">New user? <a href="register.html" style="color:var(--primary); font-weight:700;">Create an account</a></p>
      </section>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
